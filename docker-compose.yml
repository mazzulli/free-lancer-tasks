services:
  backend:
    build:
      context: ./backend
    container_name: freelaboard-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=file:/storage/freelaboard.db
      - UPLOAD_DIR=/storage/uploads
      - API_KEY=${API_KEY:-freela-secret-key-2024}
    volumes:
      - ./storage:/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${VITE_API_KEY:-freela-secret-key-2024}
        VITE_API_URL: ""
    container_name: freelaboard-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped