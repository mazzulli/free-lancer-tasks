services:
  backend:
    build:
      context: ./backend
    container_name: freelaboard-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - API_KEY=${API_KEY:-freela-secret-key-2024}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-freelance-task-files}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${VITE_API_KEY:-freela-secret-key-2024}
        VITE_API_URL: ""
    container_name: freelaboard-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped